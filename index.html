<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobur Shop PRO</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

header {
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}

.container {
  display:flex;
}

.products {
  flex:3;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

button {
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.order {
  background:green;
  color:white;
  width:100%;
}

.cart {
  flex:1;
  background:#fff;
  padding:15px;
}

.admin {
  padding:20px;
}

input {
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>🛒 Bobur Online Shop</header>

<div class="container">

<div class="products" id="products"></div>

<div class="cart">
<h3>Savat</h3>
<p id="total">Jami: 0 so'm</p>
</div>

</div>

<div class="admin">
<h3>Admin Panel</h3>
<input id="name" placeholder="Mahsulot nomi">
<input id="price" placeholder="Narxi">
<input id="img" placeholder="Rasm linki">
<button onclick="addProduct()">Qo‘shish</button>
</div>

<script>
let products = [];
let total = 0;

// TELEGRAM
let token = "8640803179:AAEuO8vWAy9rUa4Setq7pfR4g5diJcUu2Yw";
let chat_id = "6718156254";

function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let img = document.getElementById("img").value;

  products.push({name, price, img});
  showProducts();
}

function showProducts(){
  let div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach(p => {
    div.innerHTML += `
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>${p.price} so'm</p>
      <button class="order" onclick="buy('${p.name}', ${p.price})">Buyurtma</button>
    </div>`;
  });
}

function buy(name, price){
  total += Number(price);
  document.getElementById("total").innerText = "Jami: " + total + " so'm";

  let text = `🛒 Yangi buyurtma!
Mahsulot: ${name}
Narx: ${price} so'm`;

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      chat_id: chat_id,
      text: text
    })
  });

  alert("Buyurtma yuborildi!");
}
</script>

</body>
</html>
