<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1f1f2e, #2b2b45);
  color:white;
}

header {
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  letter-spacing:1px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.container {
  display:flex;
  flex-wrap:wrap;
}

.products {
  flex:3;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:15px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.order {
  background: linear-gradient(90deg, #00ff87, #60efff);
  color:black;
  width:100%;
  margin-top:10px;
}

.order:hover {
  opacity:0.8;
}

.cart {
  flex:1;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:20px;
  margin:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.admin {
  padding:20px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

.admin button {
  background:#0072ff;
  color:white;
}
</style>
