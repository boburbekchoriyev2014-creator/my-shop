<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobur Shop ADMIN</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}

header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.container {padding:20px;}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

.cart-box {
  position:fixed;
  right:10px;
  top:70px;
  background:#111;
  padding:10px;
  width:250px;
  display:none;
}

.admin {
  position:fixed;
  left:10px;
  top:70px;
  background:#111;
  padding:10px;
  width:250px;
  max-height:400px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>🔥 BOBUR SHOP</div>
  <div>
    <button onclick="toggleCart()">🛍 (<span id="count">0</span>)</button>
  </div>
</header>

<div class="container">
  <div class="products">

    <div class="card">
      <h3>Telefon</h3>
      <p>$500</p>
      <button onclick="addToCart('Telefon',500)">Qo‘shish</button>
    </div>

    <div class="card">
      <h3>Noutbuk</h3>
      <p>$900</p>
      <button onclick="addToCart('Noutbuk',900)">Qo‘shish</button>
    </div>

  </div>
</div>

<div class="cart-box" id="cartBox">
  <h3>Savat</h3>
  <ul id="list"></ul>
  <p>Jami: $<span id="total">0</span></p>
  <button onclick="pay()">💳 Buyurtma</button>
</div>

<div class="admin">
  <h3>📦 Buyurtmalar</h3>
  <ul id="orders"></ul>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let total = 0;

const TOKEN = "8640803179:AAEuO8vWAy9rUa4Setq7pfR4g5diJcUu2Yw";
const CHAT_ID = "6718156254";

function updateCart(){
  document.getElementById("list").innerHTML = "";
  total = 0;

  cart.forEach(item=>{
    total += item.price;
    let li = document.createElement("li");
    li.innerText = item.name + " - $" + item.price;
    document.getElementById("list").appendChild(li);
  });

  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;

  localStorage.setItem("cart", JSON.stringify(cart));
}

function updateOrders(){
  document.getElementById("orders").innerHTML = "";
  orders.forEach((o,i)=>{
    let li = document.createElement("li");
    li.innerText = o;
    document.getElementById("orders").appendChild(li);
  });
}

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function toggleCart(){
  let box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function pay(){
  let text = "🛒 BUYURTMA\n\n";

  cart.forEach(item=>{
    text += item.name + " $" + item.price + "\n";
  });

  text += "\nJami $" + total;

  orders.push(text);
  localStorage.setItem("orders", JSON.stringify(orders));

  let url = "https://api.telegram.org/bot8640803179:AAEuO8vWAy9rUa4Setq7pfR4g5diJcUu2Yw/sendMessage?chat_id=6718156254&text=" + encodeURIComponent(text);

  fetch(url);

  alert("✅ Buyurtma yuborildi");

  cart = [];
  updateCart();
  updateOrders();
}

updateCart();
updateOrders();
</script>

</body>
</html>
