<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobur Shop SUPER PRO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.logo {font-weight:bold;}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.container {padding:15px;}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.card {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.cart-box {
  position:fixed;
  right:10px;
  top:60px;
  background:#111;
  padding:10px;
  width:240px;
  display:none;
}

.admin {
  position:fixed;
  left:10px;
  top:60px;
  background:#111;
  padding:10px;
  width:240px;
  max-height:300px;
  overflow:auto;
  display:none;
}

.login {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000cc;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:#111;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="login" id="loginBox">
  <div class="box">
    <h2>Admin Login</h2>
    <input id="pass" placeholder="Parol"><br><br>
    <button onclick="login()">Kirish</button>
  </div>
</div>

<header>
  <div class="logo">🔥 SUPER SHOP</div>
  <div>
    <button onclick="toggleCart()">🛍 (<span id="count">0</span>)</button>
    <button onclick="toggleAdmin()">⚙️</button>
  </div>
</header>

<div class="container">
  <div class="products">

    <div class="card">
      <h3>Telefon</h3>
      <p>$500</p>
      <button onclick="addToCart('Telefon',500)">+</button>
    </div>

    <div class="card">
      <h3>Noutbuk</h3>
      <p>$900</p>
      <button onclick="addToCart('Noutbuk',900)">+</button>
    </div>

  </div>
</div>

<div class="cart-box" id="cartBox">
  <h3>Savat</h3>
  <ul id="list"></ul>
  <p>$<span id="total">0</span></p>
  <button onclick="pay()">💳 Buyurtma</button>
</div>

<div class="admin" id="adminBox">
  <h3>📦 Orders</h3>
  <ul id="orders"></ul>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let total = 0;

const TOKEN = "8640803179:AAEuO8vWAy9rUa4Setq7pfR4g5diJcUu2Yw";
const CHAT_ID = "6718156254";
const PASSWORD = "1234";

function login(){
  let p = document.getElementById("pass").value;
  if(p === PASSWORD){
    document.getElementById("loginBox").style.display = "none";
  } else {
    alert("❌ Noto‘g‘ri parol");
  }
}

function updateCart(){
  document.getElementById("list").innerHTML = "";
  total = 0;

  cart.forEach(item=>{
    total += item.price;
    let li = document.createElement("li");
    li.innerText = item.name + " $" + item.price;
    document.getElementById("list").appendChild(li);
  });

  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;

  localStorage.setItem("cart", JSON.stringify(cart));
}

function updateOrders(){
  document.getElementById("orders").innerHTML = "";
  orders.forEach(o=>{
    let li = document.createElement("li");
    li.innerText = o;
    document.getElementById("orders").appendChild(li);
  });
}

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function toggleCart(){
  let b = document.getElementById("cartBox");
  b.style.display = b.style.display==="block"?"none":"block";
}

function toggleAdmin(){
  let b = document.getElementById("adminBox");
  b.style.display = b.style.display==="block"?"none":"block";
}

function pay(){
  let time = new Date().toLocaleString();
  let text = "🛒 ORDER\n" + time + "\n\n";

  cart.forEach(item=>{
    text += item.name + " $" + item.price + "\n";
  });

  text += "\nTOTAL $" + total;

  orders.push(text);
  localStorage.setItem("orders", JSON.stringify(orders));

  let url = "https://api.telegram.org/bot8640803179:AAEuO8vWAy9rUa4Setq7pfR4g5diJcUu2Yw/sendMessage?chat_id=6718156254&text=" + encodeURIComponent(text);

  fetch(url);

  alert("✅ Yuborildi");

  cart = [];
  updateCart();
  updateOrders();
}

updateCart();
updateOrders();
</script>

</body>
</
