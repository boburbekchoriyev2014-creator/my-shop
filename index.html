<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobur Shop PRO MAX</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {font-weight:bold;}

.cart {
  background:#22c55e;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
}

.container {padding:20px;}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.cart-box {
  position:fixed;
  right:10px;
  top:70px;
  background:#020617;
  padding:15px;
  border-radius:10px;
  width:260px;
  display:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">🔥 BOBUR SHOP PRO MAX</div>
  <div class="cart" onclick="toggleCart()">🛍 (<span id="count">0</span>)</div>
</header>

<div class="container">
  <div class="products">

    <div class="card">
      <h3>Telefon</h3>
      <p>$500</p>
      <button onclick="addToCart('Telefon',500)">Qo‘shish</button>
    </div>

    <div class="card">
      <h3>Noutbuk</h3>
      <p>$900</p>
      <button onclick="addToCart('Noutbuk',900)">Qo‘shish</button>
    </div>

  </div>
</div>

<div class="cart-box" id="cartBox">
  <h3>Savat</h3>
  <ul id="list"></ul>
  <p>Jami: $<span id="total">0</span></p>
  <button onclick="clearCart()">🗑 Tozalash</button>
  <button onclick="pay()">💳 Buyurtma</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

const TOKEN = "8640803179:AAEuO8vWAy9rUa4Setq7pfR4g5diJcUu2Yw";
const CHAT_ID = "6718156254";

function updateCart(){
  document.getElementById("list").innerHTML = "";
  total = 0;

  cart.forEach(item=>{
    total += item.price;
    let li = document.createElement("li");
    li.innerText = item.name + " - $" + item.price;
    document.getElementById("list").appendChild(li);
  });

  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;

  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function clearCart(){
  cart = [];
  updateCart();
}

function toggleCart(){
  let box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function pay(){
  let text = "🛒 YANGI BUYURTMA\n\n";

  cart.forEach(item=>{
    text += "📦 " + item.name + " - $" + item.price + "\n";
  });

  text += "\n💰 Jami: $" + total;

  let url = "https://api.telegram.org/bot8640803179:AAEuO8vWAy9rUa4Setq7pfR4g5diJcUu2Yw/sendMessage?chat_id=6718156254&text=" + encodeURIComponent(text);

  fetch(url)
    .then(res => res.json())
    .then(data => {
      alert("✅ Buyurtma yuborildi!");
      clearCart();
    });
}

updateCart();
</script>

</body>
</html>
