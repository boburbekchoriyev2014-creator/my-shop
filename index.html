<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobur Shop PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

header {
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {font-weight:bold;}
.user {font-size:14px;}

.container {padding:20px;}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.cart {
  background:#22c55e;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
}

.cart-box {
  position:fixed;
  right:10px;
  top:70px;
  background:#111;
  padding:15px;
  border-radius:10px;
  width:250px;
  display:none;
}

.login-box {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000cc;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login {
  background:#111;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

input {
  padding:10px;
  margin:5px;
  width:90%;
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">
  <div class="login">
    <h2>Login</h2>
    <input id="name" placeholder="Ismingiz"><br>
    <button onclick="login()">Kirish</button>
  </div>
</div>

<header>
  <div class="logo">🛒 BOBUR SHOP</div>
  <div>
    <span class="user" id="user"></span>
    <span class="cart" onclick="toggleCart()">🛍 (<span id="count">0</span>)</span>
  </div>
</header>

<div class="container">
  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
      <h3>Telefon</h3>
      <p>$500</p>
      <button onclick="addToCart('Telefon',500)">Qo‘shish</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
      <h3>Noutbuk</h3>
      <p>$900</p>
      <button onclick="addToCart('Noutbuk',900)">Qo‘shish</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd">
      <h3>Quloqchin</h3>
      <p>$100</p>
      <button onclick="addToCart('Quloqchin',100)">Qo‘shish</button>
    </div>

  </div>
</div>

<div class="cart-box" id="cartBox">
  <h3>Savat</h3>
  <ul id="list"></ul>
  <p>Jami: $<span id="total">0</span></p>
  <button onclick="pay()">💳 To‘lov qilish</button>
</div>

<script>
let cart = [];
let total = 0;

const TOKEN = "8640803179:AAEuO8vWAy9rUa4Setq7pfR4g5diJcUu2Yw";
const CHAT_ID = "6718156254";

function login(){
  let name = document.getElementById("name").value;
  if(name){
    localStorage.setItem("user", name);
    document.getElementById("user").innerText = name;
    document.getElementById("loginBox").style.display = "none";
  }
}

window.onload = function(){
  let saved = localStorage.getItem("user");
  if(saved){
    document.getElementById("user").innerText = saved;
    document.getElementById("loginBox").style.display = "none";
  }
}

function addToCart(name, price){
  cart.push({name, price});
  total += price;

  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " - $" + price;
  document.getElementById("list").appendChild(li);
}

function toggleCart(){
  let box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function pay(){
  let user = localStorage.getItem("user") || "Noma'lum";

  let text = "🛒 YANGI BUYURTMA\n";
  text += "👤 Mijoz: " + user + "\n\n";

  cart.forEach(item=>{
    text += "📦 " + item.name + " - $" + item.price + "\n";
  });

  text += "\n💰 Jami: $" + total;

  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  });

  alert("✅ Buyurtma yuborildi!");
}
</script>

</body>
</html>
