<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobur Shop PRO</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
}

header {
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-size:20px;
  font-weight:bold;
}

.cart {
  background:#22c55e;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
}

.container {
  padding:20px;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.cart-box {
  position:fixed;
  right:10px;
  top:70px;
  background:#111;
  padding:15px;
  border-radius:10px;
  width:250px;
  display:none;
}

</style>
</head>

<body>

<header>
  <div class="logo">🛒 BOBUR SHOP</div>
  <div class="cart" onclick="toggleCart()">🛍 Savat (<span id="count">0</span>)</div>
</header>

<div class="container">
  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
      <h3>Telefon</h3>
      <p>$500</p>
      <button onclick="addToCart('Telefon',500)">Qo‘shish</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
      <h3>Noutbuk</h3>
      <p>$900</p>
      <button onclick="addToCart('Noutbuk',900)">Qo‘shish</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd">
      <h3>Quloqchin</h3>
      <p>$100</p>
      <button onclick="addToCart('Quloqchin',100)">Qo‘shish</button>
    </div>

  </div>
</div>

<div class="cart-box" id="cartBox">
  <h3>Savat</h3>
  <ul id="list"></ul>
  <p>Jami: $<span id="total">0</span></p>
  <button onclick="checkout()">Buyurtma berish</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
  cart.push({name, price});
  total += price;

  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " - $" + price;
  document.getElementById("list").appendChild(li);
}

function toggleCart(){
  let box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function checkout(){
  alert("Buyurtma qabul qilindi ✅");
}
</script>

</body>
</html>
